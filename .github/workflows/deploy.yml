name: Deploy to Amplify

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel an in-flight run if a newer commit lands on main
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      AMPLIFY_APP_ID: d1yaptreocjil0
      AMPLIFY_BRANCH: main
      AWS_REGION: us-east-1

    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.44.0
          channel: stable
          cache: true

      - name: Recreate .env from secret
        run: |
          cat > .env <<EOF
          OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          EOF

      - name: Install dependencies
        run: flutter pub get

      - name: Build web bundle
        run: flutter build web --release

      - name: Zip build output
        run: cd build/web && zip -rq ../../web.zip .

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Create Amplify deployment
        id: deployment
        run: |
          RESPONSE=$(aws amplify create-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --output json)
          echo "job_id=$(echo "$RESPONSE" | jq -r .jobId)" >> "$GITHUB_OUTPUT"
          echo "upload_url=$(echo "$RESPONSE" | jq -r .zipUploadUrl)" >> "$GITHUB_OUTPUT"

      - name: Upload bundle to Amplify
        run: |
          curl --fail --silent --show-error \
            -X PUT -T web.zip "${{ steps.deployment.outputs.upload_url }}"

      - name: Start deployment
        run: |
          aws amplify start-deployment \
            --app-id "$AMPLIFY_APP_ID" \
            --branch-name "$AMPLIFY_BRANCH" \
            --job-id "${{ steps.deployment.outputs.job_id }}"

      - name: Wait for deployment to finish
        run: |
          for i in $(seq 1 40); do
            STATUS=$(aws amplify get-job \
              --app-id "$AMPLIFY_APP_ID" \
              --branch-name "$AMPLIFY_BRANCH" \
              --job-id "${{ steps.deployment.outputs.job_id }}" \
              --query 'job.summary.status' --output text)
            echo "status=$STATUS"
            case "$STATUS" in
              SUCCEED) echo "Deployment succeeded"; exit 0 ;;
              FAILED|CANCELLED) echo "Deployment $STATUS"; exit 1 ;;
            esac
            sleep 5
          done
          echo "Timed out waiting for deployment"; exit 1

      - name: Summary
        if: success()
        run: |
          echo "### Deployed :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "https://main.d1yaptreocjil0.amplifyapp.com" >> "$GITHUB_STEP_SUMMARY"
