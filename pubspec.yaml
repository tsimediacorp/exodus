name: exodus
description: God's design. Unfiltered. Bible-based AI counsel for young couples.
publish_to: 'none'
version: 0.1.0+4

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  http: ^1.2.0
  shared_preferences: ^2.2.0
  flutter_dotenv: ^5.1.0
  gpt_markdown: ^1.0.16
  flutter_tts: ^4.2.0
  image_picker: ^1.1.2
  flutter_webrtc: ^0.12.5
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.14.1

flutter:
  uses-material-design: true
  assets:
    - .env

flutter_launcher_icons:
  image_path: "assets/icon/exodus_icon.png"
  ios: true
  remove_alpha_ios: true
  background_color_ios: "#0A0E1A"
  web:
    generate: true
    image_path: "assets/icon/exodus_icon.png"
    background_color: "#0A0E1A"
    theme_color: "#3B6FE3"
